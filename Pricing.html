<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Harga Jual Marketplace</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#0f766e;
}

label{
    font-weight:bold;
    display:block;
    margin-top:12px;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.btn-hitung{
    background:#16a34a;
    color:white;
}

.btn-reset{
    background:#dc2626;
    color:white;
}

.hasil{
    margin-top:25px;
    padding:20px;
    background:#f0fdf4;
    border-radius:10px;
    display:none;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:8px;
    border-bottom:1px solid #ddd;
}

.total{
    font-size:24px;
    color:#16a34a;
    font-weight:bold;
}

.laba{
    font-size:18px;
    color:#2563eb;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>Kalkulator Harga Jual Marketplace</h1>

<label>Harga Modal</label>
<input type="number" id="modal" placeholder="Contoh: 30000">

<label>Biaya Variabel per Paket</label>
<input type="number" id="variabel" value="2000">

<label>Biaya Tetap per Paket</label>
<input type="number" id="tetap" value="1000">

<label>Biaya Proses Pesanan Marketplace</label>
<input type="number" id="proses" value="1250">

<label>Biaya Admin Marketplace (%)</label>
<input type="number" id="admin" value="18.25" step="0.01">

<label>Pajak Penghasilan (%)</label>
<input type="number" id="pajak" value="0.5" step="0.01">

<label>Margin (%)</label>
<input type="number" id="margin" value="10" step="0.01">

<button class="btn-hitung" onclick="hitung()">Hitung Harga Jual</button>
<button class="btn-reset" onclick="resetForm()">Reset</button>

<div class="hasil" id="hasil">

<table>
<tr>
<td>HPP</td>
<td id="hpp"></td>
</tr>

<tr>
<td>Biaya Admin Marketplace</td>
<td id="biayaAdmin"></td>
</tr>

<tr>
<td>Pajak Penghasilan</td>
<td id="biayaPajak"></td>
</tr>

<tr>
<td>Margin Target</td>
<td id="marginNominal"></td>
</tr>

<tr>
<td><b>Laba Bersih per Produk</b></td>
<td class="laba" id="labaBersih"></td>
</tr>

<tr>
<td><b>Harga Jual Disarankan</b></td>
<td class="total" id="hargaJual"></td>
</tr>

</table>

</div>

</div>

<script>

function rupiah(angka){
    return new Intl.NumberFormat('id-ID',{
        style:'currency',
        currency:'IDR',
        minimumFractionDigits:0
    }).format(angka);
}

function hitung(){

    let modal = parseFloat(document.getElementById('modal').value) || 0;
    let variabel = parseFloat(document.getElementById('variabel').value) || 0;
    let tetap = parseFloat(document.getElementById('tetap').value) || 0;
    let proses = parseFloat(document.getElementById('proses').value) || 0;

    let admin = parseFloat(document.getElementById('admin').value)/100;
    let pajak = parseFloat(document.getElementById('pajak').value)/100;
    let margin = parseFloat(document.getElementById('margin').value)/100;

    let hpp = modal + variabel + tetap + proses;

    let hargaJual = hpp / (1 - (admin + pajak + margin));

    let biayaAdmin = hargaJual * admin;
    let biayaPajak = hargaJual * pajak;

    // Margin dan laba bersih sama karena harga jual sudah dihitung
    // agar target margin tercapai setelah semua biaya dipotong
    let labaBersih = hargaJual - hpp - biayaAdmin - biayaPajak;

    document.getElementById('hpp').innerHTML = rupiah(hpp);
    document.getElementById('biayaAdmin').innerHTML = rupiah(biayaAdmin);
    document.getElementById('biayaPajak').innerHTML = rupiah(biayaPajak);
    document.getElementById('marginNominal').innerHTML = rupiah(labaBersih);
    document.getElementById('labaBersih').innerHTML = rupiah(labaBersih);
    document.getElementById('hargaJual').innerHTML = rupiah(hargaJual);

    document.getElementById('hasil').style.display='block';
}

function resetForm(){

    document.getElementById('modal').value='';
    document.getElementById('variabel').value='2000';
    document.getElementById('tetap').value='1000';
    document.getElementById('proses').value='1250';
    document.getElementById('admin').value='18.25';
    document.getElementById('pajak').value='0.5';
    document.getElementById('margin').value='10';

    document.getElementById('hasil').style.display='none';
}

</script>

</body>
</html>
